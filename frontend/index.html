<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Cardiovascular AI Predictor</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            background: radial-gradient(circle at top, #0f172a, #020617);
        }

        .card {
            background: rgba(15, 23, 42, 0.85);
            border: 1px solid rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.15);
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center text-white">

    <div class="card w-[430px] p-7 rounded-3xl">

        <h1 class="text-3xl font-bold text-cyan-400 text-center mb-2">
            🫀 Cardiovascular AI
        </h1>

        <p class="text-gray-400 text-center mb-6">
            Enter health data to generate score
        </p>

        <input id="age" type="number" placeholder="Age"
            class="w-full mb-3 p-3 rounded-xl bg-gray-900 border border-cyan-700">

        <input id="before_hr" type="number" placeholder="Resting Heart Rate Before"
            class="w-full mb-3 p-3 rounded-xl bg-gray-900 border border-cyan-700">

        <input id="after_hr" type="number" placeholder="Resting Heart Rate After"
            class="w-full mb-3 p-3 rounded-xl bg-gray-900 border border-cyan-700">

        <input id="max_hr" type="number" placeholder="Maximum Heart Rate"
            class="w-full mb-3 p-3 rounded-xl bg-gray-900 border border-cyan-700">

        <input id="sleep" type="number" step="0.1" placeholder="Sleep Hours"
            class="w-full mb-5 p-3 rounded-xl bg-gray-900 border border-cyan-700">

        <button onclick="predict()"
            class="w-full p-3 rounded-xl bg-cyan-500 hover:bg-cyan-400 text-black font-bold text-lg">
            🚀 Generate Cardiovascular Score
        </button>


    </div>

    <script>
        async function predict() {
            const data = {
                age: Number(document.getElementById("age").value),
                before_hr: Number(document.getElementById("before_hr").value),
                after_hr: Number(document.getElementById("after_hr").value),
                max_hr: Number(document.getElementById("max_hr").value),
                sleep: Number(document.getElementById("sleep").value)
            };

            const response = await fetch("http://127.0.0.1:8000/predict", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });

            const result = await response.json();

            localStorage.setItem("healthResult", JSON.stringify(result));
            window.location.href = "result.html";
        }
    </script>

</body>

</html>
